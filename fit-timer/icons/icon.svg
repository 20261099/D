<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Warm cream background circle -->
  <circle cx="256" cy="256" r="256" fill="#faf2e5"/>
  <!-- Subtle border -->
  <circle cx="256" cy="256" r="248" fill="none" stroke="#e4d0bb" stroke-width="4"/>

  <!-- Timer ring background -->
  <circle cx="256" cy="256" r="168" fill="none" stroke="#f0e0cc" stroke-width="18"/>
